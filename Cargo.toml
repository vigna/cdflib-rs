[package]
name = "cdflib-rs"
version = "0.1.0"
edition = "2024"
description = "Pure-Rust port of CDFLIB: cumulative distribution functions, inverses, and parameter solvers with ACM-Algorithm-708-quality numerics"
license = "MIT"
repository = "https://github.com/vigna/cdflib-rs"
keywords = ["statistics", "distribution", "cdf", "quantile", "numerics"]
categories = ["mathematics", "science"]
readme = "README.md"

[lib]
name = "cdflib"
path = "src/lib.rs"

[dependencies]
thiserror = "2"
